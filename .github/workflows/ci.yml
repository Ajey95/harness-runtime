name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run lint
        run: |
          # Lint only project files (avoid linting installed packages)
          flake8 app tests
      - name: Run tests
        run: |
          pytest -q
      - name: Run acceptance matrix gate (FR-1..FR-10)
        run: |
          pytest -q tests/test_acceptance_matrix.py
