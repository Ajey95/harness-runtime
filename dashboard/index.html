<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Harness Runtime — Dashboard (Placeholder)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
        }

        pre {
            background: #f6f8fa;
            padding: 1rem;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <h1>Harness Runtime — Dashboard (Placeholder)</h1>
    <p>This is a minimal dashboard placeholder. It fetches traces from the FastAPI backend.</p>
    <button id="refresh">Refresh Traces</button>
    <div id="out"></div>

    <script>
        async function load() {
            const res = await fetch('/traces');
            const data = await res.json();
            document.getElementById('out').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }
        document.getElementById('refresh').addEventListener('click', load);
        load();
    </script>
</body>

</html>
